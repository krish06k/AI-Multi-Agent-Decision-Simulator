# config/gan_config.yaml

# Data
ticker: "SPY"
start_date: "2010-01-01"
end_date:   "2024-01-01"
seq_len: 30
stride: 3
norm_method: "smart"
ohlcv_dim: 12

# Generator architecture
noise_dim: 100
hidden_dim: 256
num_layers: 3
dropout: 0.1
regime_embed_dim: 32
attn_heads: 4

# Discriminator architecture
cnn_dim: 128
disc_layers: 2
use_sigmoid: false

# Training
epochs: 80
batch_size: 64
lr_g: 0.00003
lr_d: 0.00002
n_critic: 2
label_smoothing: 0.0
lambda_fm: 0.0
fm_clamp: 10.0
ema_decay: 0.990
lambda_gp: 10.0
use_wgan: true
grad_clip_g: 1.0
grad_clip_d: 1.0
d_acc_threshold: 1.0
warm_up_epochs: 0
gp_warmup_epochs: 10
gp_clamp_factor: 5.0
min_gp_lambda: 1.0
conditional: true

# Checkpointing
save_every: 10
checkpoint_dir: "models/gan_checkpoints"
log_dir: "data/logs"